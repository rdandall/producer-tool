<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5c45"/>
      <stop offset="50%" style="stop-color:#0f3d2e"/>
      <stop offset="100%" style="stop-color:#0a2a1f"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Subtle glass shine -->
  <rect width="512" height="256" fill="url(#shine)"/>
  <!-- PRDCR text -->
  <text x="256" y="296" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="900" font-size="128" letter-spacing="-6" fill="white">PRDCR</text>
  <!-- Thin accent line -->
  <rect x="96" y="340" width="320" height="3" rx="1.5" fill="rgba(255,255,255,0.25)"/>
</svg>
